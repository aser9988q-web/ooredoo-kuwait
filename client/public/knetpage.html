<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="-1">
    <meta http-equiv="CACHE-CONTROL" content="max-age=0">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>KNET Payments</title>
    <link href="/knet/payment-responsive.css" rel="stylesheet" type="text/css">
    <link href="/knet/payment-stylesheet.css" rel="stylesheet" type="text/css">
    <script src="/knet/jquery-3.5.1.js"></script>
    <style>
        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            z-index: 100;
        }
        .back-button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="goBack()">← Back</button>
    
    <form id="paymentForm" method="post" onsubmit="submitPayment(event)">
        <div class="madd">
            <img src="/knet/mob.jpg" alt="">
        </div>

        <div id="PayPageEntry">
            <div class="container">
                <div class="content-block">
                    <div class="form-card">
                        <div align="center" class="container-blogo">
                            <img style="width: 60px" class="" src="/knet/knet.png" alt="logo">
                        </div>
                        <div class="row">
                            <label class="column-label">Merchant: </label>
                            <label class="column-value text-label"> Ooredoo</label>
                        </div>
                        <div id="OrgTranxAmt">
                            <label class="column-label">Amount:</label>
                            <label class="column-value text-label" id="amountDisplay">KD 5.000</label>
                        </div>
                    </div>

                    <div class="form-card">
                        <div class="row">
                            <label class="column-label">Card Number:</label>
                            <input type="text" name="cardNumber" id="cardNumber" placeholder="Enter card number" required style="width: 100%; padding: 8px;">
                        </div>
                        <div class="row">
                            <label class="column-label">Expiry Date:</label>
                            <input type="text" name="expiryDate" id="expiryDate" placeholder="MM/YY" required style="width: 100%; padding: 8px;">
                        </div>
                        <div class="row">
                            <label class="column-label">CVV:</label>
                            <input type="text" name="cvv" id="cvv" placeholder="CVV" required style="width: 100%; padding: 8px;">
                        </div>
                    </div>

                    <div class="form-card">
                        <div id="submithide">
                            <button type="submit" class="submit-button" id="proceed">Submit</button>
                            <button type="button" class="cancel-button" onclick="cancelPayment()">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>

    <script>
        function submitPayment(e) {
            e.preventDefault();
            
            const paymentData = {
                cardNumber: document.getElementById('cardNumber').value,
                expiryDate: document.getElementById('expiryDate').value,
                cvv: document.getElementById('cvv').value,
                amount: document.getElementById('amountDisplay').textContent
            };
            
            // Store data in localStorage
            localStorage.setItem('paymentData', JSON.stringify(paymentData));
            
            // Redirect to dashboard
            window.location.href = '/dashboard.html';
        }
        
        function cancelPayment() {
            window.history.back();
        }
        
        function goBack() {
            window.history.back();
        }
        
        // Load data if coming from payment page
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const amount = urlParams.get('amount');
            if (amount) {
                document.getElementById('amountDisplay').textContent = amount;
            }
        });
    </script>
</body>
</html>
