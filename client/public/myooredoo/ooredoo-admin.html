<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة أوريدو - لوحة التحكم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a4e 0%, #2c3e50 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            color: white;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #1a2a4e;
            margin-bottom: 5px;
        }

        .logo-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .password-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        .form-divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            gap: 10px;
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .form-divider span {
            font-size: 12px;
            color: #999;
        }

        .role-selection {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-option {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            text-align: center;
            font-size: 13px;
        }

        .role-option:hover {
            border-color: #2563eb;
            background: #f0f7ff;
        }

        .role-option.active {
            border-color: #2563eb;
            background: #2563eb;
            color: white;
        }

        .role-icon {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .btn-login {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 99, 235, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .info-box {
            background: #f0f7ff;
            border-right: 4px solid #2563eb;
            padding: 12px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 12px;
            color: #1e40af;
            text-align: right;
        }

        .info-box strong {
            display: block;
            margin-bottom: 5px;
        }

        .error-message {
            background: #fee;
            border-right: 4px solid #dc2626;
            color: #991b1b;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            text-align: right;
        }

        .success-message {
            background: #ecfdf5;
            border-right: 4px solid #10b981;
            color: #065f46;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            text-align: right;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 25px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .role-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-icon">📱</div>
            <div class="logo-text">نظام إدارة أوريدو</div>
            <div class="logo-subtitle">لوحة التحكم الإدارية</div>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                <div class="password-hint">كلمة المرور حساسة لحالة الأحرف</div>
            </div>

            <div class="form-divider">
                <span>اختر صلاحيتك</span>
            </div>

            <div class="role-selection">
                <div class="role-option active" onclick="selectRole('admin', this)">
                    <div class="role-icon">👨‍💼</div>
                    <div>مسؤول النظام</div>
                </div>
                <div class="role-option" onclick="selectRole('manager', this)">
                    <div class="role-icon">📊</div>
                    <div>مدير المبيعات</div>
                </div>
                <div class="role-option" onclick="selectRole('reviewer', this)">
                    <div class="role-icon">✅</div>
                    <div>المراجع</div>
                </div>
                <div class="role-option" onclick="selectRole('support', this)">
                    <div class="role-icon">🎧</div>
                    <div>دعم العملاء</div>
                </div>
            </div>

            <input type="hidden" id="selectedRole" value="admin">

            <div class="button-group">
                <button type="reset" class="btn-reset">مسح</button>
                <button type="submit" class="btn-login">تسجيل الدخول</button>
            </div>
        </form>

        <div class="info-box">
            <strong>معلومات الدخول التجريبية:</strong>
            المستخدم: admin<br>
            كلمة المرور: 123456
        </div>
    </div>

    <script>
        function selectRole(role, element) {
            document.querySelectorAll('.role-option').forEach(el => {
                el.classList.remove('active');
            });
            element.classList.add('active');
            document.getElementById('selectedRole').value = role;
        }

        function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('selectedRole').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            // Reset messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Simple validation
            if (username === 'admin' && password === '123456') {
                successMessage.textContent = '✓ تم تسجيل الدخول بنجاح! جاري التوجيه...';
                successMessage.style.display = 'block';
                
                // Store login info in localStorage
                localStorage.setItem('adminUser', JSON.stringify({
                    username: username,
                    role: role,
                    loginTime: new Date().toISOString()
                }));

                // Redirect to dashboard after 1.5 seconds
                setTimeout(() => {
                    window.location.href = '/myooredoo/dashboard-admin.html?role=' + role;
                }, 1500);
            } else {
                errorMessage.textContent = '✗ بيانات الدخول غير صحيحة. حاول مرة أخرى.';
                errorMessage.style.display = 'block';
            }
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const adminUser = localStorage.getItem('adminUser');
            if (adminUser) {
                const user = JSON.parse(adminUser);
                // Optionally redirect to dashboard if already logged in
                // window.location.href = '/myooredoo/dashboard-admin.html?role=' + user.role;
            }
        });
    </script>
</body>
</html>
